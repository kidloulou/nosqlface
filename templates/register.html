<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #e94560;
            font-size: 1.8rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #e94560;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
            margin-top: 8px;
        }

        .btn-secondary {
            background: #0f3460;
            color: #eee;
            margin-bottom: 10px;
        }

        .btn-primary:hover,
        .btn-secondary:hover {
            opacity: 0.85;
        }

        video {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #0f3460;
        }

        .divider {
            text-align: center;
            color: #555;
            margin: 10px 0;
            font-size: 0.85rem;
        }

        #status {
            text-align: center;
            font-size: 0.9rem;
            margin: 8px 0;
            color: #aaa;
        }

        #status.ok {
            color: #4ecca3;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }

        .link a {
            color: #e94560;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Créer un compte</h1>

        <form action="/register" method="post">
            <input type="text" name="username" placeholder="Nom d'utilisateur (optionnel)">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>

            <div class="divider">— Authentification faciale (optionnelle) —</div>

            <video id="video" autoplay playsinline></video>
            <button type="button" class="btn-secondary" onclick="takeSnapshot()">Capturer mon visage</button>
            <div id="status">Aucune photo prise</div>

            <input type="hidden" name="face_data" id="face_data">
            <canvas id="canvas" style="display: none;" width="400" height="300"></canvas>

            <button type="submit" class="btn-primary">S'inscrire</button>
        </form>

        <div class="link">Déjà un compte ? <a href="/login">Se connecter</a></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const faceDataInput = document.getElementById('face_data');
        const status = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(() => {
                video.style.display = 'none';
                status.textContent = 'Webcam non disponible';
            });

        function takeSnapshot() {
            canvas.getContext('2d').drawImage(video, 0, 0, 400, 300);
            faceDataInput.value = canvas.toDataURL('image/jpeg');
            status.textContent = 'Visage capturé !';
            status.className = 'ok';
        }
    </script>
</body>
</html>
