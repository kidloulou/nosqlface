<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #f0e9df;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: #e8c9b8;
            top: -180px;
            left: -150px;
            animation: drift 10s ease-in-out infinite alternate;
        }

        .bg-orb-2 {
            width: 420px;
            height: 420px;
            background: #c9d8c5;
            bottom: -120px;
            right: -120px;
            animation: drift 14s ease-in-out infinite alternate-reverse;
        }

        .bg-orb-3 {
            width: 320px;
            height: 320px;
            background: #d4c5e2;
            top: 40%;
            left: 58%;
            animation: drift 12s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 252, 248, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 44px 40px;
            width: 440px;
            box-shadow:
                0 0 0 1px rgba(200, 180, 160, 0.15),
                0 24px 56px rgba(180, 140, 110, 0.18);
            animation: appear 0.5s ease;
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #c49a7a, #a87a5a);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(180, 130, 90, 0.3);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #3d2c1e;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #9c8474;
            margin-top: 4px;
        }

        .field {
            position: relative;
            margin-bottom: 14px;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #b8a090;
        }

        .field-icon svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: block;
        }

        input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border-radius: 12px;
            border: 1px solid #e0d0c0;
            background: rgba(255, 250, 244, 0.8);
            color: #3d2c1e;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s;
        }

        input::placeholder {
            color: #b8a490;
        }

        input:focus {
            outline: none;
            border-color: #c49a7a;
            background: #fff;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #b8a090;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 20px 0 14px;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0d0c0;
        }

        .camera-wrap {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #e0d0c0;
            background: #ede5da;
            margin-bottom: 10px;
        }

        video {
            width: 100%;
            display: block;
        }

        .camera-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .camera-corner {
            position: absolute;
            width: 22px;
            height: 22px;
            border-color: #c49a7a;
            border-style: solid;
            opacity: 0.7;
        }

        .camera-corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
        .camera-corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
        .camera-corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
        .camera-corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

        .btn-capture {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0d0c0;
            background: rgba(255, 250, 244, 0.8);
            color: #7a6050;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn-capture:hover {
            background: #fff;
            border-color: #c49a7a;
            color: #3d2c1e;
        }

        #status {
            text-align: center;
            font-size: 0.82rem;
            color: #b8a490;
            margin-bottom: 6px;
            height: 18px;
            transition: color 0.3s;
        }

        #status.ok {
            color: #7aaa88;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #c49a7a, #a87a5a);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 24px rgba(180, 130, 90, 0.28);
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.02em;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.85rem;
            color: #9c8474;
        }

        .link a {
            color: #a87a5a;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <h1>Créer un compte</h1>
            <p class="subtitle">Remplissez vos informations pour commencer</p>
        </div>

        <form action="/register" method="post">
            <div class="field">
                <span class="field-icon">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                <input type="text" name="username" placeholder="Nom d'utilisateur (optionnel)">
            </div>
            <div class="field">
                <span class="field-icon">
                    <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </span>
                <input type="email" name="email" placeholder="Adresse email" required>
            </div>
            <div class="field">
                <span class="field-icon">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
                <input type="password" name="password" placeholder="Mot de passe" required>
            </div>

            <div class="section-label">Visage (optionnel)</div>

            <div class="camera-wrap">
                <video id="video" autoplay playsinline></video>
                <div class="camera-overlay">
                    <div class="camera-corner tl"></div>
                    <div class="camera-corner tr"></div>
                    <div class="camera-corner bl"></div>
                    <div class="camera-corner br"></div>
                </div>
            </div>

            <button type="button" class="btn-capture" onclick="takeSnapshot()">Capturer mon visage</button>
            <div id="status">Aucune photo prise</div>

            <input type="hidden" name="face_data" id="face_data">
            <canvas id="canvas" width="400" height="300"></canvas>

            <button type="submit" class="btn-primary">Créer mon compte</button>
        </form>

        <div class="link">Déjà un compte ? <a href="/login">Se connecter</a></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const faceDataInput = document.getElementById('face_data');
        const status = document.getElementById('status');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(() => {
                video.closest('.camera-wrap').style.display = 'none';
                status.textContent = 'Webcam non disponible';
            });

        function takeSnapshot() {
            canvas.getContext('2d').drawImage(video, 0, 0, 400, 300);
            faceDataInput.value = canvas.toDataURL('image/jpeg');
            status.textContent = 'Visage capturé avec succès';
            status.className = 'ok';
        }
    </script>
</body>
</html>
