<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #f0e9df;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
        }

        .bg-orb-1 {
            width: 500px;
            height: 500px;
            background: #e8c9b8;
            top: -180px;
            left: -150px;
            animation: drift 10s ease-in-out infinite alternate;
        }

        .bg-orb-2 {
            width: 420px;
            height: 420px;
            background: #c9d8c5;
            bottom: -120px;
            right: -120px;
            animation: drift 14s ease-in-out infinite alternate-reverse;
        }

        .bg-orb-3 {
            width: 320px;
            height: 320px;
            background: #d4c5e2;
            top: 40%;
            left: 58%;
            animation: drift 12s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 252, 248, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 56px 48px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(200, 180, 160, 0.15),
                0 24px 56px rgba(180, 140, 110, 0.18);
            animation: appear 0.5s ease;
        }

        @keyframes appear {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #c49a7a, #8b9d77);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(180, 130, 90, 0.3);
        }

        .avatar svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(138, 180, 138, 0.15);
            border: 1px solid rgba(138, 180, 138, 0.3);
            color: #6a9a6a;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 18px;
            letter-spacing: 0.04em;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #8ab88a;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #3d2c1e;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        p {
            color: #9c8474;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            padding: 13px 32px;
            background: rgba(196, 154, 122, 0.1);
            border: 1px solid rgba(196, 154, 122, 0.35);
            color: #a87a5a;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        a:hover {
            background: rgba(196, 154, 122, 0.18);
            border-color: #c49a7a;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="card">
        <div class="avatar">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="badge">Connecté</div>
        <h1>Bienvenue, {{ username or email }} !</h1>
        <p>Vous êtes authentifié avec succès.</p>
        <a href="/logout">Se déconnecter</a>
    </div>
</body>
</html>
