<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #e94560;
            font-size: 1.8rem;
        }

        .flashes {
            list-style: none;
            background: #e94560;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #e94560;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
            margin-bottom: 10px;
        }

        .btn-face {
            background: #0f3460;
            color: #eee;
            margin-top: 8px;
        }

        .btn-primary:hover,
        .btn-face:hover {
            opacity: 0.85;
        }

        video {
            width: 100%;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid #0f3460;
        }

        .divider {
            text-align: center;
            color: #555;
            margin: 16px 0;
            font-size: 0.85rem;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #0f3460;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        #face-section {
            display: none;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }

        .link a {
            color: #e94560;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Connexion</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flashes">
                    {% for msg in messages %}
                        <li>{{ msg }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <form method="post">
            <input type="text" id="identifier" name="identifier" placeholder="Email ou nom d'utilisateur" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <div class="divider">ou</div>

        <button class="btn-face" onclick="toggleFace()">Connexion par reconnaissance faciale</button>

        <div id="face-section">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display: none;" width="400" height="300"></canvas>
            <button class="btn-face" onclick="loginWithFace()">Scanner mon visage</button>
        </div>

        <div class="link">Pas encore de compte ? <a href="/register">S'inscrire</a></div>
    </div>

    <script>
        let stream = null;

        function toggleFace() {
            const section = document.getElementById('face-section');

            if (section.style.display === 'block') {
                section.style.display = 'none';
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
            } else {
                section.style.display = 'block';
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(s => {
                        stream = s;
                        document.getElementById('video').srcObject = s;
                    })
                    .catch(() => alert('Webcam non disponible'));
            }
        }

        async function loginWithFace() {
            const identifier = document.getElementById('identifier').value;
            if (!identifier) return alert("Entrez votre email ou nom d'utilisateur d'abord");

            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.getContext('2d').drawImage(video, 0, 0, 400, 300);
            const image = canvas.toDataURL('image/jpeg');

            const response = await fetch('/login/face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: identifier, face_image: image })
            });

            const result = await response.json();
            if (result.success) {
                window.location.href = '/';
            } else {
                alert('Erreur : ' + result.message);
            }
        }
    </script>
</body>
</html>
